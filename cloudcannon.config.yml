### CloudCannon configuration
# Docs: https://cloudcannon.com/documentation/articles/configuration-file-reference/
# Conventions in this file follow the CloudCannon migration skill at
# .cloudcannon/agent-skills/ (see AGENTS.md at the repo root).

paths:
  static: public
  uploads: public/images

# Default Markdown engine + enable tables so Markdown pipe tables round-trip
# cleanly through the rich text editor.
markdown:
  engine: commonmark
  options:
    table: true

# Rich text toolbar for all `content` body fields. When any key is set here,
# omitted keys default to false — so every button we want must be declared.
_editables:
  content:
    bold: true
    italic: true
    underline: true
    strike: true
    link: true
    blockquote: true
    bulletedlist: true
    numberedlist: true
    image: true
    removeformat: true
    format: p h2 h3 h4

collections_config:
  tours:
    path: src/content/tours
    url: "/tours/[slug]/"
    icon: hiking
    name: Tours
    _enabled_editors:
      - visual
      - content
      - data
    schemas:
      default:
        path: .cloudcannon/schemas/tour.md
        name: Tour
        new_preview_url: /tours/white-pass-yukon-combo/
    add_options:
      - name: New tour
        schema: default
        icon: hiking
        # Drafts aren't built, so new tours open in the content editor which
        # doesn't need a preview URL.
        editor: content

  posts:
    path: src/content/posts
    url: "/blog/[slug]/"
    icon: post_add
    name: Blog
    _enabled_editors:
      - visual
      - content
      - data
    schemas:
      default:
        path: .cloudcannon/schemas/post.md
        name: Blog post
        new_preview_url: /blog/welcome/
    add_options:
      - name: New blog post
        schema: default
        icon: post_add
        editor: content

  pages:
    path: src/content/pages
    # The homepage entry maps to the site root. The URL pattern uses {slug}
    # (frontmatter) via a file-name override so `home.md` resolves to `/`
    # through the filter on the catch-all route.
    url: "/[slug]/"
    icon: wysiwyg
    name: Pages
    _enabled_editors:
      - visual
      - content
      - data
    schemas:
      default:
        path: .cloudcannon/schemas/page.md
        name: Page
        new_preview_url: /about/
      home:
        path: .cloudcannon/schemas/home.md
        name: Homepage
        new_preview_url: /
    # Homepage is a one-off singleton; only allow editors to add regular pages.
    add_options:
      - name: New page
        schema: default
        icon: wysiwyg
        editor: content

  faqs:
    # FAQ entries don't build their own pages — they're read and grouped by
    # faqs.astro. Each entry has both frontmatter (question/category/order)
    # and a markdown body (the answer), so editors get content + data.
    path: src/content/faqs
    icon: help
    name: FAQs
    disable_url: true
    _enabled_editors:
      - content
      - data
    add_options:
      - name: New FAQ
        icon: help
        editor: content

  site:
    # Single-file YAML data collection for site-wide settings, nav, and footer.
    path: src/content/site
    icon: settings
    name: Site settings
    disable_url: true
    disable_add: true
    disable_add_folder: true
    _enabled_editors:
      - data

collection_groups:
  - heading: Content
    collections: [tours, posts, pages, faqs]
  - heading: Configuration
    collections: [site]

# -------------------------------------------------------------------
# Inputs — cover every field in src/content.config.ts so editors get
# the right control for each key. Anything not listed here falls back
# to CloudCannon's type inference, which is often wrong.
# -------------------------------------------------------------------
_inputs:
  # --- Shared / common ---
  title:
    type: text
    comment: "Shown at the top of the page and used in page titles."
  description:
    type: textarea
    comment: "Short summary used in listings and meta descriptions."
  summary:
    type: textarea
  draft:
    type: switch
    comment: "Drafts are hidden from the built site."
  order:
    type: number
    comment: "Lower numbers appear first."
  _schema:
    hidden: true

  # --- Page hero (shared across simple pages) ---
  hero_eyebrow:
    type: text
    comment: "Small label above the page title."
  hero_title:
    type: text
    comment: "Main heading shown in the page hero. Falls back to the page title."
  hero_lead:
    type: textarea
    comment: "Intro paragraph shown under the page hero title."

  # --- Contact page ---
  reach_heading:
    type: text
  response_note:
    type: text
  newsletter_heading:
    type: text

  # --- Find-us page ---
  pickup_heading:
    type: text
  pickup_details_heading:
    type: text
  pickup_details_note:
    type: text
  map_embed_url:
    type: url
    comment: "Google Maps embed URL for the pickup-location map."

  # --- Private group page ---
  book_button_label:
    type: text

  # --- Reviews page ---
  placeholder_text:
    type: textarea

  # --- Homepage (_schema: home) ---
  tours_section:
    type: object
    options:
      preview:
        icon: hiking
  tours_section.eyebrow:
    type: text
  tours_section.title:
    type: text
  tours_section.empty_message:
    type: text
    comment: "Shown when no tours have been published yet."

  callouts:
    type: array
    options:
      structures: _structures.callouts
  callouts[*]:
    options:
      preview:
        text:
          - key: title
          - key: eyebrow
        icon: campaign
  variant:
    type: select
    options:
      values:
        - default
        - primary
  body:
    type: textarea
  cta_label:
    type: text
  cta_href:
    type: text
  eyebrow:
    type: text

  reviews_cta:
    type: object
    options:
      preview:
        icon: reviews
  reviews_cta.eyebrow:
    type: text
  reviews_cta.title:
    type: text
  reviews_cta.lead:
    type: textarea
  reviews_cta.cta_label:
    type: text
  reviews_cta.cta_href:
    type: text

  # --- Images ---
  cover:
    type: image
  featured_image:
    type: image
  gallery:
    type: array
    options:
      structures: _structures.gallery
  gallery[*]:
    type: image

  # --- Tours ---
  price_from:
    type: number
    comment: "Adult price (USD) shown as 'from $X'."
  price_child:
    type: number
    comment: "Child price (ages 2-11). Infants under 2 ride free."
  duration_hours:
    type: number
  difficulty:
    type: select
    options:
      values: _select_data.difficulties
  available_for_private_13pax:
    type: switch
    comment: "Show the Private 13-pax option for this tour."
  video_url:
    type: url
    comment: "Optional YouTube / Vimeo URL for the tour detail video."
  fareharbor_item_id:
    type: text
    comment: "The FareHarbor item ID. Leave blank to use the site-wide booking URL."
  highlights:
    type: array
    options:
      structures: _structures.highlights
  highlights[*]:
    type: text

  # --- Posts ---
  pubDate:
    type: datetime
    comment: "The publish date — controls post ordering on the blog."
  updatedDate:
    type: datetime
  author:
    type: text

  # --- FAQs ---
  question:
    type: text
  category:
    type: select
    options:
      allow_create: true
      values: [Booking, Cancellation, Passport, Pickup, Weather, General]

  # --- SEO (grouped object shown on every page/tour/post) ---
  seo:
    type: object
    comment: "Search engine + social preview overrides. Leave blank to fall back to the page title/description."
    options:
      preview:
        icon: search
  seo.meta_title:
    type: text
    comment: "Shown in browser tabs and Google search results. ~55-60 chars works best."
  seo.meta_description:
    type: textarea
    comment: "Google search snippet. ~150-160 chars of click-copy."
  seo.og_image:
    type: image
    comment: "Image used when the page is shared on social media (1200x630 recommended)."
  seo.noindex:
    type: switch
    comment: "Hide this page from search engines (e.g. thanks pages, drafts)."

  # --- Site settings (YAML) ---
  favicon:
    type: image
    comment: "Browser tab icon. SVG or PNG; 32x32 minimum."
  default_og_image:
    type: image
    comment: "Fallback social preview image used when a page doesn't set its own."
  phone:
    type: tel
  phone_label:
    type: text
  email:
    type: email
  fareharbor_shortname:
    type: text
    comment: "FareHarbor short-name — the part after /embeds/book/ in your widget URL."
  booking_url:
    type: url
    comment: "Fallback FareHarbor URL used if fareharbor_shortname is empty."
  passport_note:
    type: text
  site_name:
    type: text
  tagline:
    type: text
  id:
    hidden: true

  hero:
    type: object
    options:
      preview:
        icon: slideshow
  hero.video_src:
    type: file
    comment: "MP4 hero video. Upload to /public/video/ or paste a URL."
  hero.video_poster:
    type: image
    comment: "Poster image shown before the hero video plays."
  hero.review_stat:
    type: text
  hero.primary_cta_label:
    type: text
  hero.primary_cta_href:
    type: text

  promo_banner:
    type: object
    options:
      preview:
        icon: campaign
  promo_banner.enabled:
    type: switch
  promo_banner.text:
    type: text
  promo_banner.href:
    type: text

  social:
    type: object
    options:
      preview:
        icon: share
  social.facebook:
    type: url
  social.instagram:
    type: url
  social.tripadvisor:
    type: url

  nav:
    type: array
    options:
      structures: _structures.nav_items
  children:
    type: array
    options:
      structures: _structures.nav_children
  label:
    type: text
  href:
    type: text

  footer_groups:
    type: array
    options:
      structures: _structures.footer_groups
  heading:
    type: text
  links:
    type: array
    options:
      structures: _structures.footer_links

# -------------------------------------------------------------------
# Structures — every array input needs a matching structure so editors
# can add new items. Without these, the + Add button on arrays is a no-op.
# -------------------------------------------------------------------
_structures:
  callouts:
    style: select
    values:
      - label: Feature callout (dark)
        icon: star
        value:
          variant: primary
          eyebrow: New eyebrow
          title: New callout title
          body: Supporting copy for this callout.
          cta_label: Call to action
          cta_href: "/"
        preview:
          text:
            - key: title
          subtext:
            - key: eyebrow
          icon: star
      - label: Link callout
        icon: bookmark
        value:
          variant: default
          eyebrow: New eyebrow
          title: New callout title
          body: Supporting copy for this callout.
          cta_label: Read more →
          cta_href: "/"
        preview:
          text:
            - key: title
          subtext:
            - key: eyebrow
          icon: bookmark

  highlights:
    style: select
    values:
      - label: Highlight
        icon: check_circle
        value: "New highlight"
        preview:
          text:
            - $

  gallery:
    style: select
    values:
      - label: Image
        icon: image
        value: ""

  nav_items:
    style: select
    values:
      - label: Link
        icon: link
        value:
          label: New link
          href: "/"
        preview:
          text:
            - key: label
          subtext:
            - key: href
      - label: Dropdown
        icon: arrow_drop_down
        value:
          label: New dropdown
          children:
            - label: Item one
              href: "/"
        preview:
          text:
            - key: label
          subtext:
            - "Dropdown"

  nav_children:
    style: select
    values:
      - label: Link
        icon: link
        value:
          label: New link
          href: "/"
        preview:
          text:
            - key: label
          subtext:
            - key: href

  footer_groups:
    style: select
    values:
      - label: Footer column
        icon: view_column
        value:
          heading: New column
          links:
            - label: New link
              href: "/"
        preview:
          text:
            - key: heading
          icon: view_column

  footer_links:
    style: select
    values:
      - label: Link
        icon: link
        value:
          label: New link
          href: "/"
        preview:
          text:
            - key: label
          subtext:
            - key: href

_select_data:
  difficulties:
    - Easy
    - Moderate
    - Strenuous
