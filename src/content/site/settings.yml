- id: default
  site_name: Skagway Tours
  tagline: Unforgettable small-group adventures from Skagway into the Yukon.
  # Upload via CloudCannon -> Site settings. Paths should be served from
  # public/ (e.g. /images/favicon.svg). Leave blank to fall back to the
  # default /favicon.svg shipped with the site.
  favicon: ""
  default_og_image: ""
  phone: "+1-907-000-0000"
  phone_label: "Call or text"
  email: info@skagway.tours
  address: "401 5th Avenue\nSkagway AK 99840"
  # FareHarbor short-name (the part after /embeds/book/ in your widget URL).
  # Example: if your embed URL is https://fareharbor.com/embeds/book/skagwaytours/
  # then fareharbor_shortname = "skagwaytours"
  fareharbor_shortname: skagway
  # Fallback FareHarbor URL used if fareharbor_shortname is empty.
  booking_url: ""
  hero:
    # Drop the homepage hero video into /public/video/ and reference it here.
    video_src: "https://skagway.tours/wp-content/uploads/2026/03/HEROBANER2.mp4"
    video_poster: ""
    # Overlaid review graphic text. Final wording to be confirmed.
    review_stat: "3,000+ five-star reviews in 2025"
    primary_cta_label: "Book a Tour"
    # Scrolls to homepage Tours anchor, not FareHarbor.
    primary_cta_href: "#tours"
  promo_banner:
    enabled: true
    text: "Use code WELCOME5 for $5 off your first tour"
    href: "#tours"
  passport_note: "All our tours cross into Canada. A valid passport or approved document is required — no passport, no tour."
  social:
    facebook: ""
    instagram: ""
    tripadvisor: ""
  nav:
    - label: Tours
      href: "/#tours"
    - label: Find us
      href: "/find-us/"
    - label: About
      href: "/about/"
    - label: More
      children:
        - label: Contact
          href: "/contact/"
        - label: Passport Requirements
          href: "/passport-requirements/"
        - label: Employment
          href: "/employment/"
        - label: Blog
          href: "/blog/"
        - label: FAQs
          href: "/faqs/"
  footer_groups:
    - heading: Tours
      links:
        - { label: Browse tours, href: "/#tours" }
        - { label: Private & group, href: "/private-luxury-tours/" }
        - { label: Travel agents, href: "/travel-agents/" }
    - heading: Visit
      links:
        - { label: Find us, href: "/find-us/" }
        - { label: Passport requirements, href: "/passport-requirements/" }
        - { label: FAQs, href: "/faqs/" }
    - heading: Company
      links:
        - { label: About, href: "/about/" }
        - { label: Blog, href: "/blog/" }
